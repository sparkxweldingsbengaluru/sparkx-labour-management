<!DOCTYPE html>
<html>

<head>
<title>Sparkx Salary Management</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Sparkx Welding and Fabrications Bengaluru</h1>

<h2>Salary Management</h2>


<div class="login-box">

<h3>Javed</h3>

<p>Daily Wage: ₹1300</p>

<label>Working Days</label>
<br>
<input type="number" placeholder="Days">

<br><br>

<label>OT Amount</label>
<br>
<input type="number" placeholder="₹">

<br><br>

<label>Advance</label>
<br>
<input type="number" placeholder="₹">

<br><br>

<button>Calculate Salary</button>

<hr>


<h3>Arbaj</h3>

<p>Daily Wage: ₹1000</p>

<label>Working Days</label>
<br>
<input type="number" placeholder="Days">

<br><br>

<label>OT Amount</label>
<br>
<input type="number" placeholder="₹">

<br><br>

<label>Advance</label>
<br>
<input type="number" placeholder="₹">

<br><br>

<button>Calculate Salary</button>

<hr>


<h3>Payment Status</h3>

<select>
<option>Pending</option>
<option>Cleared</option>
</select>

<br><br>

<button>Print Salary Slip</button>


</div>

</div>

</body>

</html>
