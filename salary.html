<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Salary Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .full-width-container { width: 100%; margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background-color: #333; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>
    
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>

    <div class="full-width-container">
        <h2>Table 1: Complete Monthly Salary</h2>
        <input type="month" id="salaryMonth" onchange="refreshAllSalaryData()">
        <div id="salaryTableContainer"></div>
    </div>

    <div class="full-width-container">
        <h2>Table 2: Custom Date Range Earnings</h2>
        From: <input type="date" id="rangeStart" onchange="refreshAllSalaryData()">
        To: <input type="date" id="rangeEnd" onchange="refreshAllSalaryData()">
        <div id="rangeSalaryTableContainer"></div>
    </div>

    <div class="full-width-container" style="border-top: 4px solid #b71c1c;">
        <h2>Table 3: Record a Cash Payout / Settlement</h2>
        <form id="payoutForm" onsubmit="handleFormSubmission(event)">
            <input type="hidden" id="editingPayoutId">
            <select id="payoutWorker" required></select>
            <input type="number" id="payoutAmount" placeholder="Amount (₹)" required step="any">
            <!-- NEW: Date Picker -->
            <input type="date" id="payoutDate" required>
            <select id="payoutType">
                <option value="Final Settlement">Final Settlement</option>
                <option value="Advances">Advances</option>
            </select>
            <input type="text" id="payoutNotes" placeholder="Remarks">
            <button type="submit" id="submitPayoutBtn">SAVE PAYOUT</button>
            <button type="button" id="cancelEditBtn" onclick="clearPayoutForm()" style="display:none;">Cancel</button>
        </form>
        <div id="payoutHistoryLog" style="margin-top:20px;"></div>
    </div>
</div>

<script>
const _supabase = supabase.createClient("https://fjzqscohyteznkehiqnf.supabase.co", "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE");
let labourList = JSON.parse(localStorage.getItem('labourList')) || [{id: "1", name: "Javed", wage: 1300}, {id: "2", name: "Arbaj", wage: 1000}];

window.onload = function() {
    let today = new Date().toISOString().split('T')[0];
    document.getElementById('salaryMonth').value = today.substring(0, 7);
    document.getElementById('rangeStart').value = today.substring(0, 7) + "-01";
    document.getElementById('rangeEnd').value = today;
    document.getElementById('payoutDate').value = today; // Set default to today
    
    const dropdown = document.getElementById('payoutWorker');
    labourList.forEach(w => {
        dropdown.innerHTML += `<option value="${w.id}" data-name="${w.name}">${w.name}</option>`;
    });
    refreshAllSalaryData();
};

async function refreshAllSalaryData() {
    const { data: att } = await _supabase.from('attendance_history').select('*');
    const { data: pay } = await _supabase.from('workshop_payouts').select('*').order('created_at', { ascending: false });
    renderMonthly(att || [], pay || []);
    renderRangeEarnings(att || [], pay || []);
    renderMasterLedger(pay || []);
}

function renderMonthly(att, pay) {
    const [y, m] = document.getElementById('salaryMonth').value.split('-');
    const filteredAtt = att.filter(r => new Date(r.date).getMonth()+1 == m && new Date(r.date).getFullYear() == y);
    const filteredPay = pay.filter(p => new Date(p.created_at).getMonth()+1 == m && new Date(p.created_at).getFullYear() == y);
    document.getElementById('salaryTableContainer').innerHTML = generateTable(filteredAtt, filteredPay);
}

function renderRangeEarnings(att, pay) {
    const start = new Date(document.getElementById('rangeStart').value);
    const end = new Date(document.getElementById('rangeEnd').value);
    end.setHours(23, 59, 59, 999);
    const filteredAtt = att.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
    const filteredPay = pay.filter(p => new Date(p.created_at) >= start && new Date(p.created_at) <= end);
    document.getElementById('rangeSalaryTableContainer').innerHTML = generateTable(filteredAtt, filteredPay);
}

function generateTable(attRows, payRows) {
    let html = `<table><tr><th>Name</th><th>Gross</th><th>Advances</th><th>Settlements</th><th>Net</th></tr>`;
    labourList.forEach(w => {
        const wAtt = attRows.filter(r => r.labourid == w.id && r.status == "Present");
        const wPay = payRows.filter(p => p.labourid == w.id);
        const gross = wAtt.reduce((sum, r) => sum + (parseFloat(r.wageattime)||w.wage) + (parseFloat(r.otamount)||0), 0);
        const totalAdvances = wAtt.reduce((sum, r) => sum + (parseFloat(r.advance)||0), 0) + wPay.filter(p => p.type && p.type.toLowerCase().includes("advance")).reduce((s, p) => s + parseFloat(p.amount), 0);
        const totalSettlements = wPay.filter(p => p.type && p.type.toLowerCase().includes("settlement")).reduce((s, p) => s + parseFloat(p.amount), 0);
        const net = gross - totalAdvances - totalSettlements;
        html += `<tr><td>${w.name}</td><td>₹${gross}</td><td>₹${totalAdvances}</td><td>₹${totalSettlements}</td><td style="font-weight:bold; color:${net<0?'red':'green'}">₹${net}</td></tr>`;
    });
    return html + `</table>`;
}

function renderMasterLedger(pay) {
    document.getElementById('payoutHistoryLog').innerHTML = pay.map(p => `
        <div style="border-bottom:1px solid #eee; padding:8px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <strong>${p.created_at}</strong> - ${p.name}: ₹${p.amount} (${p.type})
                ${p.notes ? `<br><small style="color:gray;">Remarks: ${p.notes}</small>` : ''}
            </div>
            <div>
                <button onclick='editPayout(${JSON.stringify(p).replace(/'/g, "&apos;")})' style="background:#0288d1; color:white; border:none; padding:3px 8px; cursor:pointer;">EDIT</button>
                <button onclick='deletePayout("${p.id}")' style="background:#d32f2f; color:white; border:none; padding:3px 8px; cursor:pointer; margin-left:5px;">DELETE</button>
            </div>
        </div>`).join('');
}

async function deletePayout(id) { if (confirm("Delete this record?")) { await _supabase.from('workshop_payouts').delete().eq('id', id); refreshAllSalaryData(); } }
function editPayout(p) { document.getElementById('editingPayoutId').value = p.id; document.getElementById('payoutWorker').value = p.labourid; document.getElementById('payoutAmount').value = p.amount; document.getElementById('payoutType').value = p.type; document.getElementById('payoutNotes').value = p.notes || ""; document.getElementById('payoutDate').value = p.created_at; document.getElementById('submitPayoutBtn').innerHTML = "UPDATE"; document.getElementById('cancelEditBtn').style.display = "inline"; }
function clearPayoutForm() { document.getElementById('editingPayoutId').value = ""; document.getElementById('submitPayoutBtn').innerHTML = "SAVE PAYOUT"; document.getElementById('cancelEditBtn').style.display = "none"; document.getElementById('payoutDate').value = new Date().toISOString().split('T')[0]; }

async function handleFormSubmission(e) { 
    e.preventDefault(); 
    const id = document.getElementById('editingPayoutId').value; 
    const data = { 
        labourid: document.getElementById('payoutWorker').value, 
        name: document.getElementById('payoutWorker').options[document.getElementById('payoutWorker').selectedIndex].text, 
        amount: parseFloat(document.getElementById('payoutAmount').value), 
        type: document.getElementById('payoutType').value, 
        notes: document.getElementById('payoutNotes').value,
        created_at: document.getElementById('payoutDate').value
    }; 
    if(id) await _supabase.from('workshop_payouts').update(data).eq('id', id); 
    else await _supabase.from('workshop_payouts').insert([data]); 
    await refreshAllSalaryData(); 
    clearPayoutForm(); 
    document.getElementById('payoutAmount').value = ""; 
}
</script>
</body>
</html>
