<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Salary Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>
      
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h2>Salary Management</h2>

    <div class="login-box">
        <h3>Select Calculation Payroll Month</h3>
        <input type="month" id="salaryMonth" onchange="loadSalaryData()">
        <hr style="margin: 20px 0;">
        <div id="salaryContainer"><p style="color: gray; font-style: italic;">Please select a payroll month.</p></div>
    </div>
</div>

<script>
window.onload = function() {
    let today = new Date(), y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('salaryMonth').value = `${y}-${m}`;
    loadSalaryData();
};

function loadSalaryData() {
    const selectedMonth = document.getElementById('salaryMonth').value;
    const container = document.getElementById('salaryContainer');
    if (!selectedMonth) return;

    const [tYear, tMonth] = selectedMonth.split('-').map(Number);
    let labourList = JSON.parse(localStorage.getItem('labourList')) || [{ id: "1", name: "Javed", wage: 1300 }, { id: "2", name: "Arbaj", wage: 1000 }];
    let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
    let paidRegistry = JSON.parse(localStorage.getItem('paidSalaryRegistry')) || {};

    container.innerHTML = '';

    labourList.forEach((worker, index) => {
        let records = history.filter(r => {
            let d = new Date(r.date);
            return r.labourId === worker.id && d.getFullYear() === tYear && (d.getMonth() + 1) === tMonth;
        });

        let workingDays = records.filter(r => r.status === "Present").length;
        let totalOT = records.reduce((sum, r) => sum + r.otAmount, 0);
        let totalAdv = records.reduce((sum, r) => sum + r.advance, 0);
        let netPayout = (workingDays * worker.wage + totalOT) - totalAdv;
        let isPaid = paidRegistry[`${worker.id}_${selectedMonth}`] ? true : false;

        const card = document.createElement('div');
        card.innerHTML = `
            <h3>${worker.name}</h3>
            <p>Daily Wage: ₹${worker.wage}</p>
            <p>Working Days: ${workingDays} | OT: ₹${totalOT} | Advance Deductions: ₹${totalAdv}</p>
            <p><strong>Net Final Payout:</strong> ₹${netPayout}</p>
            <select id="status_${worker.id}" ${isPaid ? 'disabled' : ''}>
                <option value="Pending" ${!isPaid ? 'selected' : ''}>Pending</option>
                <option value="Cleared" ${isPaid ? 'selected' : ''}>Cleared</option>
            </select><br><br>
            <button onclick="processPayment('${worker.id}', '${selectedMonth}')" ${isPaid ? 'style="background:#6c757d;"' : ''}>
                ${isPaid ? 'Salary Disbursed' : 'Pay & Print Slip'}
            </button>
            ${index < labourList.length - 1 ? '<hr style="margin:25px 0; border-top:1px dashed #ccc;">' : ''}
        `;
        container.appendChild(card);
    });
}

function processPayment(workerId, monthStr) {
    const dropdown = document.getElementById(`status_${workerId}`);
    if (dropdown.value === "Cleared") {
        let paidRegistry = JSON.parse(localStorage.getItem('paidSalaryRegistry')) || {};
        paidRegistry[`${workerId}_${monthStr}`] = true;
        localStorage.setItem('paidSalaryRegistry', JSON.stringify(paidRegistry));
        alert("Payment Processed! Opening print window...");
        window.print();
        loadSalaryData();
    } else {
        alert("Please change status to 'Cleared' first.");
    }
}
</script>

</body>
</html>
