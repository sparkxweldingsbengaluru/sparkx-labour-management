<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Salary Management</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1200px; margin: auto; }
        .full-width-container { background: #fff; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; }
        th { background: #333; color: #fff; }
    </style>
</head>
<body>
<div class="container">
    <h1>Sparkx Management Dashboard</h1>
    <div class="full-width-container">
        <h3>Global Filters</h3>
        Month: <input type="month" id="filterMonth" onchange="refreshDashboard()">
        From: <input type="date" id="filterStart" onchange="refreshDashboard()">
        To: <input type="date" id="filterEnd" onchange="refreshDashboard()">
    </div>

    <div id="tableContainer">
        <div class="full-width-container" id="section1"><h2>Monthly Ledger</h2><div id="div1"></div></div>
        <div class="full-width-container" id="section2"><h2>Date Range Earnings</h2><div id="div2"></div></div>
        <div class="full-width-container" id="section4"><h2>Paid Details (Ledger View)</h2><div id="div4"></div></div>
    </div>
</div>

<script>
const _supabase = supabase.createClient("https://fjzqscohyteznkehiqnf.supabase.co", "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE");
let appData = { attendance: [], payouts: [] };
let labourList = [{id: "1", name: "Javed", wage: 1300}, {id: "2", name: "Arbaj", wage: 1000}];

async function refreshDashboard() {
    const { data: att } = await _supabase.from('attendance_history').select('*');
    const { data: pay } = await _supabase.from('workshop_payouts').select('*');
    
    // 1. NORMALIZATION: Fix spelling/types here once
    appData.attendance = att || [];
    appData.payouts = (pay || []).map(p => ({
        ...p,
        cleanType: p.type.toLowerCase().includes('advance') ? 'Advances' : 'Final Settlement',
        dateObj: new Date(p.created_at)
    }));
    renderAll();
}

function renderAll() {
    const start = new Date(document.getElementById('filterStart').value);
    const end = new Date(document.getElementById('filterEnd').value);
    
    // Shared Logic: Filter data based on range
    const filteredPay = appData.payouts.filter(p => p.dateObj >= start && p.dateObj <= end);
    
    // Render Table 4 (The Ledger View)
    let html4 = `<table><tr><th>Date</th><th>Name</th><th>Type</th><th>Amount</th></tr>`;
    let total = 0;
    filteredPay.forEach(p => {
        total += parseFloat(p.amount) || 0;
        html4 += `<tr><td>${p.dateObj.toLocaleDateString()}</td><td>${p.name}</td><td>${p.cleanType}</td><td>₹${p.amount}</td></tr>`;
    });
    html4 += `<tr><td colspan="3" style="text-align:right"><b>GRAND TOTAL</b></td><td><b>₹${total}</b></td></tr></table>`;
    document.getElementById('div4').innerHTML = html4;
}

window.onload = () => {
    let today = new Date();
    document.getElementById('filterStart').value = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
    document.getElementById('filterEnd').value = today.toISOString().split('T')[0];
    refreshDashboard();
};
</script>
</body>
</html>
