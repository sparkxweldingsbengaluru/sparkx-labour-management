<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Labour Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h2>Labour Attendance & Salary Management</h2>

    <div class="login-box">
        <h3>Admin Login</h3>
        <input id="username" placeholder="Username">
        <input id="password" type="password" placeholder="Password">
        <button onclick="login()">LOGIN</button>
        <p id="message" style="color: red; font-weight: bold; margin-top: 10px;"></p>
    </div>
</div>

<script>
function login(){
    let user = document.getElementById("username").value.trim();
    let pass = document.getElementById("password").value;
    let messageBox = document.getElementById("message");

    messageBox.innerHTML = "";

    // Updated custom admin passwords
    if (user === "Admin1" && pass === "2025") {
        window.location.href = "dashboard.html";
    } 
    else if (user === "Admin2" && pass === "2026") {
        window.location.href = "dashboard.html";
    } 
    else if (user === "" || pass === "") {
        messageBox.innerHTML = "Please fill in both fields.";
    } 
    else {
        messageBox.innerHTML = "Invalid username or password";
    }
}
</script>

</body>
</html>
