<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; }
        .container { width: 90%; margin: auto; text-align: center; }
        .menu { background: #0d47a1; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .menu a { color: white; text-decoration: none; font-weight: bold; margin: 0 10px; }
        .stats-row { display: flex; justify-content: center; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; padding: 20px; border-radius: 8px; width: 150px; color: white; font-weight: bold; }
        .work-history { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; width: 400px; margin: auto; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>

    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h3>Management Dashboard (Cloud Real-Time Metrics)</h3>

    <div class="stats-row">
        <div class="stat-card" style="background:#0d47a1;">TOTAL WORKERS<br>2</div>
        <div class="stat-card" style="background:#2e7d32;">PRESENT TODAY<br>0</div>
        <div class="stat-card" style="background:#c62828;">MONTH TOTAL ADVANCES<br>₹13200</div>
        <div class="stat-card" style="background:#2e7d32;">MONTH REMAINING PAYMENT<br>₹5200</div>
    </div>

    <div class="work-history">
        <h2>View Daily Work History</h2>
        <input type="date" id="historyFilterDate" onchange="loadDailyHistory()">
        <div id="dailyHistoryContainer" style="margin-top: 15px;"></div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://fjzqscohyteznkehiqnf.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE"; 
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

window.onload = function() {
    document.getElementById('historyFilterDate').value = new Date().toISOString().split('T')[0];
    loadDailyHistory();
};

async function loadDailyHistory() {
    const container = document.getElementById('dailyHistoryContainer');
    const selectedRawDate = document.getElementById('historyFilterDate').value; 
    
    if(!selectedRawDate) return;

    // Convert "2026-06-19" to "6/19/2026" to match database text format
    const [y, m, d] = selectedRawDate.split('-');
    const targetDateStr = `${parseInt(m)}/${parseInt(d)}/${y}`;

    container.innerHTML = `<p>Loading...</p>`;

    const { data: allRecords, error } = await _supabase.from('attendance_history').select('*');
    if (error) { container.innerHTML = `<p>Error</p>`; return; }

    const dailyRecords = allRecords.filter(r => r.date && r.date.trim() === targetDateStr);
    
    if (dailyRecords.length === 0) { 
        container.innerHTML = `<p>No logs found for ${targetDateStr}.</p>`; 
        return; 
    }

    container.innerHTML = '';
    dailyRecords.forEach(row => {
        let card = document.createElement('div');
        card.style.cssText = "padding: 10px; border: 1px solid #ddd; margin-top: 10px; border-radius: 5px; text-align: left;";
        card.innerHTML = `
            <div style="display:flex; justify-content:space-between;">
                <strong>${row.name}</strong>
                <span style="background: #2e7d32; color: white; padding: 2px 5px; border-radius: 3px; font-size: 10px;">${row.status}</span>
            </div>
            <div style="font-size: 12px;">In: ${row.intime} | Out: ${row.outtime}</div>
            <div style="font-size: 12px;">OT: ₹${row.otamount} | Advance: ₹${row.advance}</div>
        `;
        container.appendChild(card);
    });
}
</script>
</body>
</html>
