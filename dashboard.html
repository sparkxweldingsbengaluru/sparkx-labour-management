<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 20px; }
        .stat-card { padding: 20px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid #333; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>

    <h1>Sparkx Management Dashboard</h1>

    <div class="dashboard-grid">
        <!-- New Monthly Payment Stat Card -->
        <div class="stat-card" style="border-top: 4px solid #2e7d32;">
            <h3>Month Remaining Payment</h3>
            <p id="totalNetBalance" style="font-size: 24px; font-weight: bold; color: #2e7d32;">Calculating...</p>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://fjzqscohyteznkehiqnf.supabase.co"; 
const SUPABASE_KEY = "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE"; 
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Ensure this matches your labour list
let labourList = JSON.parse(localStorage.getItem('labourList')) || [{id: "1", name: "Javed", wage: 1300}, {id: "2", name: "Arbaj", wage: 1000}];

window.onload = async function() {
    await updateDashboardStats();
};

async function updateDashboardStats() {
    const { data: att } = await _supabase.from('attendance_history').select('*');
    const { data: pay } = await _supabase.from('workshop_payouts').select('*');
    
    const now = new Date();
    const currentMonth = now.getMonth() + 1;
    const currentYear = now.getFullYear();

    const monthAtt = att.filter(r => new Date(r.date).getMonth() + 1 === currentMonth && new Date(r.date).getFullYear() === currentYear);
    const monthPay = pay.filter(p => new Date(p.created_at).getMonth() + 1 === currentMonth && new Date(p.created_at).getFullYear() === currentYear);

    let grandTotalNet = 0;
    
    labourList.forEach(w => {
        const wAtt = monthAtt.filter(r => r.labourid == w.id && r.status == "Present");
        const wPay = monthPay.filter(p => p.labourid == w.id);
        
        const gross = wAtt.reduce((sum, r) => sum + (parseFloat(r.wageattime)||w.wage) + (parseFloat(r.otamount)||0), 0);
        
        // Match the logic used in salary.html: Attendance Advance + Payout Advance
        const attAdvances = wAtt.reduce((sum, r) => sum + (parseFloat(r.advance)||0), 0);
        const payoutAdvances = wPay.filter(p => p.type == "Advance").reduce((s, p) => s + parseFloat(p.amount), 0);
        const totalAdvances = attAdvances + payoutAdvances;
        
        const totalSettlements = wPay.filter(p => p.type == "Final Settlement").reduce((s, p) => s + parseFloat(p.amount), 0);
        
        grandTotalNet += (gross - totalAdvances - totalSettlements);
    });

    document.getElementById('totalNetBalance').innerText = `₹${grandTotalNet.toLocaleString()}`;
}
</script>
</body>
</html>
