<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .full-width-container { width: 100%; margin-bottom: 20px; padding: 20px; border: 1px solid #ddd; border-radius: 8px; background: #fff; }
        .menu { background: #0d47a1; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        .menu a { color: white; text-decoration: none; font-weight: bold; margin: 0 10px; }
        .metric-grid { display: flex; gap: 20px; margin-bottom: 20px; }
        .metric { flex: 1; padding: 20px; color: white; border-radius: 8px; text-align: center; font-weight: bold; }
        .history-card { border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { background: #c8e6c9; color: #2e7d32; padding: 2px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>

    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h3>Management Dashboard (Cloud Real-Time Metrics)</h3>

    <div class="metric-grid">
        <div class="metric" style="background: #0d47a1;">TOTAL WORKERS<br><span id="totalWorkers">0</span></div>
        <div class="metric" style="background: #2e7d32;">PRESENT TODAY<br><span id="presentToday">0</span></div>
        <div class="metric" style="background: #c62828;">MONTH TOTAL ADVANCES<br>₹<span id="monthAdvances">0</span></div>
        <div class="metric" style="background: #ef6c00;">MONTH REMAINING PAYMENT<br>₹<span id="remainingPayment">0</span></div>
    </div>

    <div class="full-width-container">
        <h2>View Daily Work History</h2>
        <input type="date" id="historyDate" onchange="loadHistory()" style="margin-bottom: 20px; width: 100%; padding: 10px;">
        <div id="historyContainer"></div>
    </div>
</div>

<script>
const _supabase = supabase.createClient("https://fjzqscohyteznkehiqnf.supabase.co", "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE");

window.onload = async function() {
    document.getElementById('historyDate').value = new Date().toISOString().split('T')[0];
    loadHistory();
    // Fetch metrics...
};

async function loadHistory() {
    const date = document.getElementById('historyDate').value;
    const { data: att } = await _supabase.from('attendance_history').select('*').eq('date', date);
    
    let html = "";
    (att || []).forEach(r => {
        html += `
        <div class="history-card">
            <div>
                <strong>${r.name || 'Worker'}</strong><br>
                <small>In: ${r.intime || '-'} | Out: ${r.outtime || '-'}</small><br>
                <small>OT: ₹${r.otamount || 0} | Advance: ₹${r.advance || 0}</small>
            </div>
            <div class="status-badge">${r.status || 'Absent'}</div>
        </div>`;
    });
    document.getElementById('historyContainer').innerHTML = html || "<p>No records for this date.</p>";
}
</script>
</body>
</html>
