<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sparkx Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; text-align: center; }
        .menu { background: #0d47a1; padding: 15px; border-radius: 8px; margin-bottom: 25px; }
        .menu a { color: white; text-decoration: none; font-weight: bold; margin: 0 10px; }
        .stats-row { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .stat-card { flex: 1; min-width: 180px; padding: 15px; border-radius: 8px; color: white; font-weight: bold; }
        .work-history { background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd; max-width: 500px; margin: auto; }
        .worker-card { padding: 10px; border: 1px solid #ddd; margin-top: 10px; border-radius: 5px; text-align: left; position: relative; }
        .badge { background: #2e7d32; color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; float: right; }
        .badge-absent { background: #d32f2f; }
    </style>
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>

    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h3>Management Dashboard (Cloud Real-Time Metrics)</h3>

    <div class="stats-row">
        <div class="stat-card" style="background:#0d47a1;">TOTAL WORKERS<br><span id="metricTotalWorkers">0</span></div>
        <div class="stat-card" style="background:#2e7d32;">PRESENT TODAY<br><span id="metricPresentToday">0</span></div>
        <div class="stat-card" style="background:#c62828;">MONTH ADVANCES<br><span id="metricMonthAdvance">₹0</span></div>
        <div class="stat-card" style="background:#ef6c00;">REMAINING PAYMENT<br><span id="totalNetBalance">₹0</span></div>
    </div>

    <div class="work-history">
        <h3>View Daily Work History</h3>
        <input type="date" id="historyFilterDate" onchange="loadDailyHistory()" style="width: 100%; padding: 8px; margin-bottom: 10px;">
        <div id="dailyHistoryContainer"></div>
    </div>
</div>

<script>
const _supabase = supabase.createClient("https://fjzqscohyteznkehiqnf.supabase.co", "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE");

window.onload = function() {
    document.getElementById('historyFilterDate').value = new Date().toISOString().split('T')[0];
    loadDashboardMetrics();
    loadDailyHistory();
};

async function loadDashboardMetrics() {
    const { data: workers } = await _supabase.from('labour_list').select('id, name, wage');
    const { data: history } = await _supabase.from('attendance_history').select('*');
    const { data: pay } = await _supabase.from('workshop_payouts').select('*');
    
    if(workers) document.getElementById('metricTotalWorkers').textContent = workers.length;

    let now = new Date();
    let currentMonth = now.getMonth() + 1;
    let currentYear = now.getFullYear();
    let todayStr = `${now.getMonth()+1}/${now.getDate()}/${now.getFullYear()}`;

    let presentCount = 0;
    let monthAdv = 0;
    let totalRemainingPayment = 0;

    history.forEach(row => {
        if (row.date === todayStr && row.status === "Present") presentCount++;
        let d = new Date(row.date);
        if (d.getMonth() + 1 === currentMonth && d.getFullYear() === currentYear) {
            monthAdv += parseFloat(row.advance) || 0;
        }
    });

    workers.forEach(w => {
        const wAtt = history.filter(r => r.labourid == w.id && new Date(r.date).getMonth()+1 == currentMonth);
        const wPay = pay.filter(p => p.labourid == w.id && new Date(p.created_at).getMonth()+1 == currentMonth);
        
        const gross = wAtt.reduce((sum, r) => {
            if (r.status === "Present") {
                return sum + (parseFloat(r.wageattime) || w.wage) + (parseFloat(r.otamount) || 0);
            }
            return sum;
        }, 0);

        const adv = wAtt.reduce((sum, r) => sum + (parseFloat(r.advance)||0), 0) + 
                    wPay.filter(p => p.type && p.type.toLowerCase().includes("advance")).reduce((s, p) => s + parseFloat(p.amount), 0);
        const set = wPay.filter(p => p.type && p.type.toLowerCase().includes("settlement")).reduce((s, p) => s + parseFloat(p.amount), 0);
        
        totalRemainingPayment += (gross - adv - set);
    });

    document.getElementById('metricPresentToday').textContent = presentCount;
    document.getElementById('metricMonthAdvance').textContent = "₹" + monthAdv;
    document.getElementById('totalNetBalance').textContent = "₹" + totalRemainingPayment.toLocaleString();
}

async function loadDailyHistory() {
    const container = document.getElementById('dailyHistoryContainer');
    const rawDate = document.getElementById('historyFilterDate').value; 
    if(!rawDate) return;

    const [y, m, d] = rawDate.split('-');
    const targetDateStr = `${parseInt(m)}/${parseInt(d)}/${y}`;

    container.innerHTML = "Loading...";

    const { data, error } = await _supabase.from('attendance_history').select('*').eq('date', targetDateStr);
    
    if (error || !data || data.length === 0) {
        container.innerHTML = "No logs found for this date.";
        return;
    }

    container.innerHTML = data.map(row => {
        const isAbsent = row.status.toLowerCase() === 'absent';
        const badgeClass = isAbsent ? 'badge badge-absent' : 'badge';
        return `
            <div class="worker-card">
                <span class="${badgeClass}">${row.status}</span>
                <strong>${row.name}</strong><br>
                <small>In: ${row.intime || '--'} | Out: ${row.outtime || '--'}</small><br>
                <small>OT: ₹${row.otamount || 0} | Advance: ₹${row.advance || 0}</small>
            </div>
        `;
    }).join('');
}
</script>
</body>
</html>
