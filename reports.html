<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Reports</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>
      
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h2>Labour Reports</h2>

    <div class="login-box">
        <h3>Monthly Report</h3>
        <label>Select Month</label><br>
        <input type="month" id="reportMonth" onchange="generateReport()">
        <hr>
        <div id="reportsContainer"></div>
        <br>
        <button onclick="window.print()">Print Report</button>
    </div>
</div>

<script>
window.onload = function() {
    let today = new Date(), y = today.getFullYear(), m = String(today.getMonth() + 1).padStart(2, '0');
    document.getElementById('reportMonth').value = `${y}-${m}`;
    generateReport();
};

function generateReport() {
    const monthVal = document.getElementById('reportMonth').value;
    const container = document.getElementById('reportsContainer');
    if (!monthVal) return;

    const [tYear, tMonth] = monthVal.split('-').map(Number);
    let labourList = JSON.parse(localStorage.getItem('labourList')) || [{ id: "1", name: "Javed", wage: 1300 }, { id: "2", name: "Arbaj", wage: 1000 }];
    let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
    let paidRegistry = JSON.parse(localStorage.getItem('paidSalaryRegistry')) || {};

    container.innerHTML = '';

    labourList.forEach((worker, index) => {
        let records = history.filter(r => {
            let d = new Date(r.date);
            return r.labourId === worker.id && d.getFullYear() === tYear && (d.getMonth() + 1) === tMonth;
        });

        let workingDays = records.filter(r => r.status === "Present").length;
        let totalOT = records.reduce((sum, r) => sum + r.otAmount, 0);
        let totalAdv = records.reduce((sum, r) => sum + r.advance, 0);
        let isPaid = paidRegistry[`${worker.id}_${monthVal}`] ? "Paid" : "Pending";

        const div = document.createElement('div');
        div.innerHTML = `
            <h3>${worker.name}</h3>
            <p>Daily Wage: ₹${worker.wage}</p>
            <p>Working Days: ${workingDays} | OT Total: ₹${totalOT} | Advance Total: ₹${totalAdv}</p>
            <p>Salary Status: <span style="font-weight:bold; color:${isPaid === 'Paid' ? 'green' : 'orange'};">${isPaid}</span></p>
            ${index < labourList.length - 1 ? '<hr style="margin:15px 0; border-top:1px dashed #ccc;">' : ''}
        `;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
