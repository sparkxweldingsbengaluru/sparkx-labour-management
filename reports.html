<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Reports & Logs</title>
    <link rel="stylesheet" href="style.css">
    <!-- Links your app to the free global Supabase engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>
      
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h2>Attendance Reports & Master Log (Cloud Sync)</h2>

    <div class="login-box" style="max-width: 800px;">
        <div style="display: flex; gap: 15px; margin-bottom: 20px; align-items: flex-end; flex-wrap: wrap;">
            <div style="flex: 1; min-width: 200px;">
                <label style="font-weight: bold; color: #0d47a1;">Filter by Worker (Optional)</label><br>
                <select id="reportLabourFilter" onchange="generateReport()" style="width: 100%; padding: 6px; margin-top: 5px;">
                    <option value="ALL">-- All Workers --</option>
                </select>
            </div>
            <div>
                <button onclick="window.print()" style="background: #28a745; padding: 8px 15px; font-weight: bold;">🖨️ PRINT REPORT</button>
            </div>
        </div>

        <hr style="margin: 20px 0;">

        <div id="reportTableContainer">
            <p style="color: gray; font-style: italic;">Loading compiled history log from the cloud...</p>
        </div>
    </div>
</div>

<script>
// Cloud Database Connection Keys
const SUPABASE_URL = "https://fjzqscohyteznkehiqnf.supabase.co"; 
// ⚠️ Paste your long key from your settings screen between these quotes:
const SUPABASE_KEY = "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE"; 

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

window.onload = function() {
    populateWorkerFilter();
    generateReport();
};

// Pulls current registry details to populate the filter dropdown element
async function populateWorkerFilter() {
    const filterSelect = document.getElementById('reportLabourFilter');
    
    const { data: workers } = await _supabase
        .from('labour_list')
        .select('*')
        .order('name', { ascending: true });

    if (workers) {
        workers.forEach(w => {
            let opt = document.createElement('option');
            opt.value = w.id;
            opt.textContent = w.name;
            filterSelect.appendChild(opt);
        });
    }
}

async function generateReport() {
    const container = document.getElementById('reportTableContainer');
    const selectedFilter = document.getElementById('reportLabourFilter').value;
    
    container.innerHTML = '<p style="color: gray; font-style: italic;">Pulling continuous log records from cloud database...</p>';

    // Fetch master history rows from cloud table
    const { data: history, error } = await _supabase
        .from('attendance_history')
        .select('*');

    if (error) {
        container.innerHTML = `<p style="color: red;">Cloud Retrieval Error: ${error.message}</p>`;
        return;
    }

    if (!history || history.length === 0) {
        container.innerHTML = '<p style="color: gray; font-style: italic;">No historical attendance data found in the cloud.</p>';
        return;
    }

    // Sort logs chronologically (newest entries at top)
    let sortedData = history.sort((a, b) => b.created_at.localeCompare(a.created_at));

    // Apply worker filter if single selection made
    if (selectedFilter !== "ALL") {
        sortedData = sortedData.filter(r => String(r.labourid) === String(selectedFilter));
    }

    if (sortedData.length === 0) {
        container.innerHTML = '<p style="color: gray; font-style: italic;">No records match your filter criteria.</p>';
        return;
    }

    // Compile dynamic master layout table array
    let tableHtml = `
        <table border="1" style="width:100%; border-collapse: collapse; text-align: left; font-size: 14px;">
            <thead>
                <tr style="background-color: #333; color: white;">
                    <th style="padding: 8px;">Date</th>
                    <th style="padding: 8px;">Worker Name</th>
                    <th style="padding: 8px;">Status</th>
                    <th style="padding: 8px;">Timings</th>
                    <th style="padding: 8px;">OT Amount</th>
                    <th style="padding: 8px;">Advance Given</th>
                </tr>
            </thead>
            <tbody>
    `;

    sortedData.forEach(row => {
        let isPresent = row.status === "Present";
        tableHtml += `
            <tr style="border-bottom: 1px solid #ddd; background: ${isPresent ? '#fff' : '#fff3f3'};">
                <td style="padding: 8px; font-weight: bold;">${row.date}</td>
                <td style="padding: 8px;">${row.name}</td>
                <td style="padding: 8px; font-weight: bold; color: ${isPresent ? 'green' : 'red'};">${row.status}</td>
                <td style="padding: 8px; color: #555;">${isPresent ? `${row.intime} - ${row.outtime}` : '--'}</td>
                <td style="padding: 8px; color: green;">${row.otamount > 0 ? `₹${row.otamount}` : '₹0'}</td>
                <td style="padding: 8px; color: ${row.advance > 0 ? 'red' : '#333'}; font-weight: ${row.advance > 0 ? 'bold' : 'normal'};">
                    ${row.advance > 0 ? `₹${row.advance}` : '₹0'}
                </td>
            </tr>
        `;
    });

    tableHtml += `
            </tbody>
        </table>
    `;

    container.innerHTML = tableHtml;
}
</script>

</body>
</html>
