<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Reports</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .container { max-width: 1000px; margin: auto; background: #fff; padding: 20px; border-radius: 8px; }
        .controls { display: flex; gap: 10px; margin-bottom: 20px; align-items: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: left; }
        th { background: #333; color: #fff; }
        .summary-card { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { padding: 15px; background: #e8f5e9; border-radius: 5px; flex: 1; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Business Performance Report</h1>
    <div class="controls">
        From: <input type="date" id="repStart" onchange="generateReport()">
        To: <input type="date" id="repEnd" onchange="refreshData()">
        <button onclick="downloadCSV()">Download CSV</button>
    </div>

    <div class="summary-card" id="summary"></div>
    <div id="reportTableContainer"></div>
</div>

<script>
const _supabase = supabase.createClient("https://fjzqscohyteznkehiqnf.supabase.co", "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE");
let appData = { att: [], pay: [] };
let labourList = JSON.parse(localStorage.getItem('labourList')) || [{id: "1", name: "Javed", wage: 1300}, {id: "2", name: "Arbaj", wage: 1000}];

async function refreshData() {
    const { data: att } = await _supabase.from('attendance_history').select('*');
    const { data: pay } = await _supabase.from('workshop_payouts').select('*');
    appData.att = att || [];
    appData.pay = pay || [];
    generateReport();
}

function generateReport() {
    const start = new Date(document.getElementById('repStart').value);
    const end = new Date(document.getElementById('repEnd').value);
    end.setHours(23, 59, 59);

    const fAtt = appData.att.filter(r => new Date(r.date) >= start && new Date(r.date) <= end);
    const fPay = appData.pay.filter(p => new Date(p.created_at) >= start && new Date(p.created_at) <= end);

    let html = `<table><tr><th>Worker</th><th>Gross Earnings</th><th>Advances</th><th>Settlements</th><th>Net Paid</th></tr>`;
    let totals = { gross: 0, adv: 0, set: 0 };

    labourList.forEach(w => {
        const wAtt = fAtt.filter(r => r.labourid == w.id && r.status == "Present");
        const wPay = fPay.filter(p => p.labourid == w.id);
        
        const gross = wAtt.reduce((sum, r) => sum + (parseFloat(r.wageattime)||w.wage) + (parseFloat(r.otamount)||0), 0);
        const adv = wPay.filter(p => p.type.toLowerCase().includes("advance")).reduce((s, p) => s + parseFloat(p.amount), 0);
        const set = wPay.filter(p => p.type == "Final Settlement").reduce((s, p) => s + parseFloat(p.amount), 0);
        
        totals.gross += gross; totals.adv += adv; totals.set += set;
        html += `<tr><td>${w.name}</td><td>₹${gross}</td><td>₹${adv}</td><td>₹${set}</td><td>₹${gross - adv - set}</td></tr>`;
    });

    html += `</table>`;
    document.getElementById('reportTableContainer').innerHTML = html;
    document.getElementById('summary').innerHTML = `
        <div class="card">Total Gross: ₹${totals.gross}</div>
        <div class="card">Total Advances: ₹${totals.adv}</div>
        <div class="card">Total Settlements: ₹${totals.set}</div>`;
}

function downloadCSV() {
    let csv = "Worker,Gross,Advances,Settlements,Net\n";
    // Add logic to map the current filtered data to rows...
    alert("CSV Download logic ready to be triggered!");
}

window.onload = () => {
    let d = new Date();
    document.getElementById('repEnd').value = d.toISOString().split('T')[0];
    d.setDate(1);
    document.getElementById('repStart').value = d.toISOString().split('T')[0];
    refreshData();
};
</script>
</body>
</html>
