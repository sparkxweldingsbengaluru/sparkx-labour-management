<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>
      
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h2>Attendance Entry</h2>

    <div class="login-box">
        <h3 id="date"></h3>
        <h3 id="clock"></h3>
        <hr>

        <form id="attendanceForm">
            <label>Select Labour</label><br>
            <select id="labourSelect" required><option value="">-- Choose Worker --</option></select>
            <br><br>

            <label>Attendance</label><br>
            <select id="attendanceStatus">
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
            </select>
            <br><br>

            <label>In Time</label><br>
            <select id="inTime" required>
                <option value="">-- Select In Time --</option>
                </select>
            <br><br>

            <label>Out Time</label><br>
            <select id="outTime" required>
                <option value="">-- Select Out Time --</option>
                </select>
            <br><br>

            <label>OT Amount</label><br>
            <input type="number" id="otAmount" placeholder="₹" value="0">
            <br><br>

            <label>Advance</label><br>
            <input type="number" id="advanceAmount" placeholder="₹" value="0">
            <br><br>

            <button type="submit">SAVE ATTENDANCE</button>
        </form>

        <hr style="margin: 20px 0;">
        
        <h3>Recent Entries (Today)</h3>
        <div id="recentEntriesContainer">
            <p style="color: gray; font-style: italic;">No entries made today yet.</p>
        </div>
    </div>
</div>

<script>
function clock(){
    let now = new Date();
    document.getElementById("date").innerHTML = now.toDateString();
    document.getElementById("clock").innerHTML = now.toLocaleTimeString();
}
setInterval(clock, 1000);
clock();

// Shared centralized data arrays fallback system
let labourList = JSON.parse(localStorage.getItem('labourList')) || [
    { id: "1", name: "Javed", wage: 1300 }, 
    { id: "2", name: "Arbaj", wage: 1000 }
];
const selectEl = document.getElementById('labourSelect');

// Clean and build dropdown menu selection
selectEl.innerHTML = '<option value="">-- Choose Worker --</option>';
labourList.forEach(w => {
    let opt = document.createElement('option');
    opt.value = w.id;
    opt.textContent = w.name;
    selectEl.appendChild(opt);
});

// Helper function to build 12-hour AM/PM options with 15, 30, 45 minute intervals
function populateTimeDropdowns() {
    const inTimeSelect = document.getElementById('inTime');
    const outTimeSelect = document.getElementById('outTime');
    
    const periods = ["AM", "PM"];
    const minutes = ["00", "15", "30", "45"];
    
    // We want a standard sequence: 12 AM to 11 AM, then 12 PM to 11 PM
    periods.forEach(period => {
        // Core hour loop
        for (let h = 1; h <= 12; h++) {
            // Minute interval loop
            minutes.forEach(m => {
                let timeString = `${h}:${m} ${period}`;
                
                let optIn = document.createElement('option');
                optIn.value = timeString;
                optIn.textContent = timeString;
                inTimeSelect.appendChild(optIn);

                let optOut = document.createElement('option');
                optOut.value = timeString;
                optOut.textContent = timeString;
                outTimeSelect.appendChild(optOut);
            });
        }
    });
}
populateTimeDropdowns();

// Completely safe data rendering engine utilizing distinct IDs
function renderRecentEntries() {
    const container = document.getElementById('recentEntriesContainer');
    let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
    let todayStr = new Date().toLocaleDateString();
    
    container.innerHTML = '';
    
    let matchesToday = history.filter(r => r.date === todayStr);
    
    if (matchesToday.length === 0) {
        container.innerHTML = '<p style="color: gray; font-style: italic;">No entries made today yet.</p>';
        return;
    }
    
    history.forEach(record => {
        if (record.date === todayStr) {
            let div = document.createElement('div');
            div.style.padding = "10px 0";
            div.innerHTML = `
                <p style="margin: 5px 0;"><strong>${record.name}</strong> - ${record.status}<br>
                <small style="color: #666;">In: ${record.inTime || '--'} | Out: ${record.outTime || '--'}</small><br>
                (OT: ₹${record.otAmount}, Adv: ₹${record.advance})</p>
                <button onclick="deleteAttendance('${record.entryId}')" style="background:#dc3545; padding: 5px 10px; font-size: 12px; width: auto; display: inline-block;">Delete Entry</button>
                <hr style="margin: 10px 0; border: 0; border-top: 1px dashed #ccc;">
            `;
            container.appendChild(div);
        }
    });
}

// Handle data submission routing safely
document.getElementById('attendanceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if(!selectEl.value) return alert("Please select a valid worker profile first!");
    
    let worker = labourList.find(w => w.id === selectEl.value);
    
    let record = {
        entryId: "ATT_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        date: new Date().toLocaleDateString(),
        labourId: worker.id,
        name: worker.name,
        wageAtTime: worker.wage,
        status: document.getElementById('attendanceStatus').value,
        inTime: document.getElementById('inTime').value,
        outTime: document.getElementById('outTime').value,
        otAmount: parseFloat(document.getElementById('otAmount').value) || 0,
        advance: parseFloat(document.getElementById('advanceAmount').value) || 0
    };

    let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
    history.push(record);
    localStorage.setItem('attendanceHistory', JSON.stringify(history));

    alert("Attendance saved successfully!");
    this.reset();
    renderRecentEntries();
});

window.deleteAttendance = function(targetEntryId) {
    if (confirm("Are you sure you want to delete this attendance entry?")) {
        let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
        history = history.filter(record => record.entryId !== targetEntryId);
        localStorage.setItem('attendanceHistory', JSON.stringify(history));
        renderRecentEntries();
    }
}

renderRecentEntries();
</script>

</body>
</html>
