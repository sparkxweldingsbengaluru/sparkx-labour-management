<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Attendance</title>
    <link rel="stylesheet" href="style.css">
    <!-- Links your app to the free global Supabase engine -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>
      
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h2>Attendance Entry (Cloud Database Sync)</h2>

    <div class="login-box">
        <label style="font-weight: bold; color: #0d47a1;">Attendance Date</label><br>
        <input type="date" id="attendanceDate" onchange="renderRecentEntries()" style="font-weight: bold; font-size: 16px; border: 2px solid #0d47a1;">
        <hr style="margin: 15px 0;">

        <form id="attendanceForm">
            <label>Select Labour</label><br>
            <select id="labourSelect" required><option value="">-- Choose Worker --</option></select>
            <br><br>

            <label>Attendance Status</label><br>
            <select id="attendanceStatus" onchange="toggleTimeFields()">
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
            </select>
            <br><br>

            <div id="timeFieldsWrapper">
                <label>In Time</label><br>
                <select id="inTime"><option value="">-- Select In Time --</option></select>
                <br><br>

                <label>Out Time</label><br>
                <select id="outTime"><option value="">-- Select Out Time --</option></select>
                <br><br>

                <label>OT Amount</label><br>
                <input type="number" id="otAmount" placeholder="₹" value="0">
                <br><br>
            </div>

            <label>Advance Given</label><br>
            <input type="number" id="advanceAmount" placeholder="₹" value="0">
            <br><br>

            <button type="submit" id="saveBtn">SAVE TO CLOUD</button>
        </form>

        <hr style="margin: 20px 0;">
        
        <h3 id="recentTitle">Entries for this Date</h3>
        <div id="recentEntriesContainer" style="max-height: 220px; overflow-y: auto; border: 1px solid #eee; padding: 10px; border-radius: 8px; background: #fafafa;">
            <p style="color: gray; font-style: italic;">Loading cloud database records...</p>
        </div>
    </div>
</div>

<script>
// Cloud Database Connection Keys
const SUPABASE_URL = "https://fjzqscohyteznkehiqnf.supabase.co"; 
// ⚠️ Paste your long key from Screenshot (8).png between these quotes:
const SUPABASE_KEY = "sb_publishable_ER-PXAe4A1vsLDYETL4BKw_G7p24kTE"; 

const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

window.onload = function() {
    let today = new Date();
    let yyyy = today.getFullYear();
    let mm = String(today.getMonth() + 1).padStart(2, '0');
    let dd = String(today.getDate()).padStart(2, '0');
    document.getElementById('attendanceDate').value = `${yyyy}-${mm}-${dd}`;
    
    populateTimeDropdowns();
    toggleTimeFields(); 
    renderRecentEntries();
};

let labourList = JSON.parse(localStorage.getItem('labourList')) || [
    { id: "1", name: "Javed", wage: 1300 }, 
    { id: "2", name: "Arbaj", wage: 1000 }
];
const selectEl = document.getElementById('labourSelect');

selectEl.innerHTML = '<option value="">-- Choose Worker --</option>';
labourList.forEach(w => {
    let opt = document.createElement('option');
    opt.value = w.id;
    opt.textContent = w.name;
    selectEl.appendChild(opt);
});

function populateTimeDropdowns() {
    const inTimeSelect = document.getElementById('inTime');
    const outTimeSelect = document.getElementById('outTime');
    const periods = ["AM", "PM"];
    const minutes = ["00", "15", "30", "45"];
    
    periods.forEach(period => {
        for (let h = 1; h <= 12; h++) {
            minutes.forEach(m => {
                let timeString = `${h}:${m} ${period}`;
                let optIn = document.createElement('option');
                optIn.value = timeString; optIn.textContent = timeString;
                inTimeSelect.appendChild(optIn);

                let optOut = document.createElement('option');
                optOut.value = timeString; optOut.textContent = timeString;
                outTimeSelect.appendChild(optOut);
            });
        }
    });
}

function toggleTimeFields() {
    const status = document.getElementById('attendanceStatus').value;
    const wrapper = document.getElementById('timeFieldsWrapper');
    if (status === "Absent") {
        wrapper.style.display = "none";
        document.getElementById('inTime').value = "";
        document.getElementById('outTime').value = "";
        document.getElementById('otAmount').value = "0";
    } else {
        wrapper.style.display = "block";
        document.getElementById('inTime').value = "8:00 AM";
        document.getElementById('outTime').value = "5:00 PM";
    }
}

// Fixed to use lowercase parameters matching database columns
async function renderRecentEntries() {
    const container = document.getElementById('recentEntriesContainer');
    const titleEl = document.getElementById('recentTitle');
    const selectedRawDate = document.getElementById('attendanceDate').value;
    
    if(!selectedRawDate) return;

    const [y, m, d] = selectedRawDate.split('-');
    let targetDateStr = new Date(y, m - 1, d).toLocaleDateString();
    titleEl.textContent = `Entries for ${targetDateStr}`;
    
    container.innerHTML = '<p style="color: gray; font-style: italic;">Fetching records from cloud...</p>';

    const { data: history, error } = await _supabase
        .from('attendance_history')
        .select('*')
        .eq('date', targetDateStr);

    if (error) {
        container.innerHTML = `<p style="color: red;">Cloud Error: ${error.message}</p>`;
        return;
    }

    container.innerHTML = '';
    if (!history || history.length === 0) {
        container.innerHTML = '<p style="color: gray; font-style: italic;">No entries made for this date yet.</p>';
        return;
    }
    
    history.forEach(record => {
        let div = document.createElement('div');
        div.style.padding = "5px 0";
        div.innerHTML = `
            <p style="margin: 5px 0; font-size: 14px;"><strong>${record.name}</strong> - <span style="font-weight:bold; color:${record.status === 'Present' ? 'green' : 'red'};">${record.status}</span><br>
            ${record.status === 'Present' ? `<small style="color: #666;">In: ${record.intime} | Out: ${record.outtime}</small><br>` : ''}
            <small style="color:#333;">(OT: ₹${record.otamount}, Adv: ₹${record.advance})</small></p>
            <button onclick="deleteAttendance('${record.entryid}')" style="background:#dc3545; padding: 3px 8px; font-size: 11px; width: auto; display: inline-block; margin-bottom:5px;">Delete Entry</button>
            <hr style="margin: 5px 0; border: 0; border-top: 1px dashed #ddd;">
        `;
        container.appendChild(div);
    });
}

// Fixed to match database lowercase schema format
document.getElementById('attendanceForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const saveBtn = document.getElementById('saveBtn');
    if(!selectEl.value) return alert("Please select a worker first!");
    
    saveBtn.disabled = true;
    saveBtn.textContent = "SAVING TO CLOUD...";

    let worker = labourList.find(w => w.id === selectEl.value);
    let status = document.getElementById('attendanceStatus').value;
    let selectedRawDate = document.getElementById('attendanceDate').value;
    
    const [y, m, d] = selectedRawDate.split('-');
    let finalSavedDateStr = new Date(y, m - 1, d).toLocaleDateString();
    
    let record = {
        entryid: "ATT_" + Date.now() + "_" + Math.floor(Math.random() * 1000),
        date: finalSavedDateStr,
        labourid: worker.id,
        name: worker.name,
        wageattime: worker.wage,
        status: status,
        intime: status === "Present" ? document.getElementById('inTime').value : "--",
        outtime: status === "Present" ? document.getElementById('outTime').value : "--",
        otamount: status === "Present" ? (parseFloat(document.getElementById('otAmount').value) || 0) : 0,
        advance: parseFloat(document.getElementById('advanceAmount').value) || 0
    };

    const { error } = await _supabase.from('attendance_history').insert([record]);

    if (error) {
        alert("Failed to save to cloud: " + error.message);
    } else {
        alert("Attendance synced with Cloud successfully!");
        document.getElementById('labourSelect').value = "";
        document.getElementById('advanceAmount').value = "0";
        toggleTimeFields(); 
        renderRecentEntries();
    }
    saveBtn.disabled = false;
    saveBtn.textContent = "SAVE TO CLOUD";
});

window.deleteAttendance = async function(targetEntryId) {
    if (confirm("Are you sure you want to delete this attendance entry from the cloud?")) {
        const { error } = await _supabase
            .from('attendance_history')
            .delete()
            .eq('entryid', targetEntryId);

        if (error) {
            alert("Delete failed: " + error.message);
        } else {
            renderRecentEntries();
        }
    }
}
</script>

</body>
</html>
