<!DOCTYPE html>
<html>
<head>
    <title>Sparkx Attendance</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="menu">
        <a href="dashboard.html">🏠 Dashboard</a>
        <a href="labour.html">👷 Labour</a>
        <a href="attendance.html">📅 Attendance</a>
        <a href="salary.html">💰 Salary</a>
        <a href="reports.html">📄 Reports</a>
        <a href="index.html">Logout</a>
    </div>
      
    <h1>Sparkx Welding and Fabrications Bengaluru</h1>
    <h2>Attendance Entry</h2>

    <div class="login-box">
        <h3 id="date"></h3>
        <h3 id="clock"></h3>
        <hr>

        <form id="attendanceForm">
            <label>Select Labour</label><br>
            <select id="labourSelect" required><option value="">-- Choose Worker --</option></select>
            <br><br>

            <label>Attendance</label><br>
            <select id="attendanceStatus">
                <option value="Present">Present</option>
                <option value="Absent">Absent</option>
            </select>
            <br><br>

            <label>In Time</label><br>
            <input type="time" id="inTime">
            <br><br>

            <label>Out Time</label><br>
            <input type="time" id="outTime">
            <br><br>

            <label>OT Amount</label><br>
            <input type="number" id="otAmount" placeholder="₹" value="0">
            <br><br>

            <label>Advance</label><br>
            <input type="number" id="advanceAmount" placeholder="₹" value="0">
            <br><br>

            <button type="submit">SAVE ATTENDANCE</button>
        </form>

        <hr style="margin: 20px 0;">
        
        <h3>Recent Entries (Today)</h3>
        <div id="recentEntriesContainer">
            <p style="color: gray; font-style: italic;">No entries made today yet.</p>
        </div>
    </div>
</div>

<script>
function clock(){
    let now = new Date();
    document.getElementById("date").innerHTML = now.toDateString();
    document.getElementById("clock").innerHTML = now.toLocaleTimeString();
}
setInterval(clock, 1000);
clock();

let labourList = JSON.parse(localStorage.getItem('labourList')) || [{ id: "1", name: "Javed", wage: 1300 }, { id: "2", name: "Arbaj", wage: 1000 }];
const selectEl = document.getElementById('labourSelect');

// Populate dropdown
labourList.forEach(w => {
    let opt = document.createElement('option');
    opt.value = w.id;
    opt.textContent = w.name;
    selectEl.appendChild(opt);
});

// Function to load and render entries made today
function renderRecentEntries() {
    const container = document.getElementById('recentEntriesContainer');
    let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
    let todayStr = new Date().toLocaleDateString();
    
    // Filter out only today's entries
    let todayEntries = history.filter(r => r.date === todayStr);
    
    container.innerHTML = '';
    
    if (todayEntries.length === 0) {
        container.innerHTML = '<p style="color: gray; font-style: italic;">No entries made today yet.</p>';
        return;
    }
    
    // Display today's entries with a delete button
    // We pass the unique index from the main history array to target it precisely
    history.forEach((record, originalIndex) => {
        if (record.date === todayStr) {
            let div = document.createElement('div');
            div.style.padding = "10px 0";
            div.innerHTML = `
                <p style="margin: 5px 0;"><strong>${record.name}</strong> - ${record.status} (OT: ₹${record.otAmount}, Adv: ₹${record.advance})</p>
                <button onclick="deleteAttendance(${originalIndex})" style="background:#dc3545; padding: 5px 10px; font-size: 12px; width: auto;">Delete Entry</button>
                <hr style="margin: 10px 0; border: 0; border-top: 1px dashed #ccc;">
            `;
            container.appendChild(div);
        }
    });
}

// Handle Form Submission
document.getElementById('attendanceForm').addEventListener('submit', function(e) {
    e.preventDefault();
    let worker = labourList.find(w => w.id === selectEl.value);
    
    let record = {
        date: new Date().toLocaleDateString(),
        labourId: worker.id,
        name: worker.name,
        wageAtTime: worker.wage,
        status: document.getElementById('attendanceStatus').value,
        inTime: document.getElementById('inTime').value,
        outTime: document.getElementById('outTime').value,
        otAmount: parseFloat(document.getElementById('otAmount').value) || 0,
        advance: parseFloat(document.getElementById('advanceAmount').value) || 0
    };

    let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
    history.push(record);
    localStorage.setItem('attendanceHistory', JSON.stringify(history));

    alert("Attendance saved successfully!");
    this.reset();
    renderRecentEntries(); // Refresh the list below
});

// NEW FUNCTION: Delete entry function
function deleteAttendance(index) {
    if (confirm("Are you sure you want to delete this attendance entry?")) {
        let history = JSON.parse(localStorage.getItem('attendanceHistory')) || [];
        
        // Remove the entry at that specific position
        history.splice(index, 1);
        
        // Save back to storage
        localStorage.setItem('attendanceHistory', JSON.stringify(history));
        
        // Refresh the list immediately
        renderRecentEntries();
    }
}

// Initial view check on load
renderRecentEntries();
</script>

</body>
</html>
